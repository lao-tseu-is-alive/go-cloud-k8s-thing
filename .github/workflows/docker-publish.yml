name: Docker-publish

on:
  push:
    # Publish semver tags as releases.
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}


jobs:
  build-scan-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # Mandatory for uploading SARIF results
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write
    # Service containers to run with `builder` job
    services:
      # Label used to access the service container
      # https://docs.github.com/en/actions/using-containerized-services/creating-postgresql-service-containers
      postgres:
        # Docker Hub image
        image: postgis/postgis:14-3.3
        # Provide the password for postgres
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Preparing Test Env
        run: |
          echo $RELEASE_VERSION
          echo ${{ env.RELEASE_VERSION }}      

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.26.0'
      - run: go version

      - name: Add unaccent extension to Postgres DB
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -p 5432 -d postgres -U postgres -c 'CREATE EXTENSION unaccent;'

      - name: Test
        env:
          PORT: 9090
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER_ID: ${{ secrets.JWT_ISSUER_ID }}
          JWT_CONTEXT_KEY: ${{ secrets.JWT_CONTEXT_KEY }}
          JWT_DURATION_MINUTES: 240
          JWT_AUTH_URL: ${{ secrets.JWT_AUTH_URL }}
          JWT_STATUS_URL: ${{ secrets.JWT_STATUS_URL }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          DB_DRIVER: postgres
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_SSL_MODE: prefer
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: postgres
          PGPASSWORD: postgres
          APP_DSN: postgres://127.0.0.1:${{ job.services.postgres.ports[5432] }}/postgres?sslmode=disable&user=postgres&password=postgres
        run: make -e test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.out

      - name: Setup Docker buildx
        # v3 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        # v3 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build the image locally first for scanning
      - name: Build local image
        # v5 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: .
          load: true # This loads the image into the local docker daemon instead of pushing it
          tags: ${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Run your verified Trivy scanner
      - name: Run Trivy vulnerability scanner
        # v0.35.0 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Prevents rate limiting
        with:
          image-ref: '${{ github.repository }}:${{ github.sha }}'
          severity: 'MEDIUM,CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'

      # 3. Upload results to the Security tab
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      # 4. Final Push - Only if previous steps (including scan) succeeded
      - name: Extract Docker metadata
        id: meta
        # v5 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        # v5 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use build cache to speed up subsequent runs
          cache-from: type=gha
          cache-to: type=gha,mode=max