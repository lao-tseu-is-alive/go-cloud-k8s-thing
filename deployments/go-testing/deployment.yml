metadata:
  name: cpu-limit-range
spec:
  limits:
    - default:
        cpu: "1"
      defaultRequest:
        cpu: "0.5"
      type: Container
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: go-testing
  name: pod-reader-role
  labels:
    app: go-cloud-k8s-thing
rules:
  - apiGroups: [""]  # "" indicates the core API group
    resources: ["pods", "namespaces"]
    verbs: ["get", "watch", "list"]
# to allow reading pods logs with : kubectl logs -l app=go-cloud-k8s-shell --all-containers=true -n test-go-cloud-k8s-shell
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: go-cloud-k8s-thing-sa
  namespace: go-testing
  labels:
    app: go-cloud-k8s-thing
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader-role-binding
  labels:
    app: go-cloud-k8s-thing
subjects:
  - kind: ServiceAccount
    name: go-cloud-k8s-thing-sa
    namespace: go-testing
roleRef:
  kind: Role
  name: pod-reader-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: service-reader-role
  labels:
    app: go-cloud-k8s-thing
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: service-reader-role-binding
  labels:
    app: go-cloud-k8s-thing
subjects:
  - kind: ServiceAccount
    name: go-cloud-k8s-thing-sa
    namespace: go-testing
roleRef:
  kind: Role
  name: service-reader-role
  apiGroup: rbac.authorization.k8s.io
