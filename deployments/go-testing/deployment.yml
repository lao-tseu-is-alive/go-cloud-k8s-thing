## with this service you can connect from another pod with
## curl http://go-cloud-k8s-thing-service.go-testing:9090
apiVersion: v1
kind: Service                    # Type of kubernetes resource
metadata:
  name: go-cloud-k8s-thing-service   # Name of the resource
  namespace: go-testing
  labels:     # The labels that will be applied
    app: go-cloud-k8s-thing
# with k3s LoadBalancer keep the next 2 lines commented or it wil not work
#  annotations:
#    externalTrafficPolicy: "local"
spec:
  #type: NodePort                 # A port is opened on each node in your cluster via Kube proxy.
  # https://kubernetes.io/docs/concepts/services-networking/service/#loadbalancer
  type: LoadBalancer             # Adds a load balancer (from the cloud provider)
  # k3s will deploy a daemonset listening on the given port on the host node
  # By default k3s have a builtin load balancer called "klipper" https://github.com/k3s-io/klipper-lb ok for one dev node.
  # It is possible to run multiple Services on the same node, as long as they use different ports.
  # in case you are using a 'real' k3s cluster with multiple nodes consider using metalLB instead
  # with k3s LoadBalancer keep the next 3 lines commented or it wil not work
  #externalTrafficPolicy: Local
  #loadBalancerSourceRanges:
  #  - 192.168.0.0/16
  ports:                         # Take incoming HTTP requests on this port (exposed) and forward them to the targetPort of container
    - name: http
      port: 9090
      targetPort: 9090            # Should match the PORT env variable in deployment and containerPort that the Go application listens on
  selector:
    app: go-cloud-k8s-thing         # Map any pod with this label `app=go-cloud-k8s-thing` to this service
---
# PodDisruptionBudget Protects against voluntary disruptions (node drain, cluster upgrade, kubectl drain).
# With 2 replicas, without a PDB the cluster can evict both pods simultaneously,
# causing brief downtime. minAvailable: 1 ensures at least one pod stays running during maintenance.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: go-cloud-k8s-thing-pdb
  namespace: go-testing
  labels:
    app: go-cloud-k8s-thing
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: go-cloud-k8s-thing
---
apiVersion: apps/v1
kind: Deployment                 # Type of Kubernetes resource
metadata:
  name: go-cloud-k8s-thing           # Name of the Kubernetes resource
  namespace: go-testing
  labels:
    app: go-cloud-k8s-thing
spec:
  replicas: 2                    # Number of pods to run at any given time
  revisionHistoryLimit: 5        # The number of old ReplicaSets to retain to allow rollback
  minReadySeconds: 5             # Minimum number of seconds for which a newly created pod should be ready without any of its container crashing, for it to be considered available. Defaults to 0 (pod will be considered available as soon as it is ready)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2               # maximum number of pods that can be scheduled above the desired number of pods.
  selector:
    matchLabels:
      app: go-cloud-k8s-thing              # This deployment applies to any Pods matching the specified label
  template:                      # This deployment will create a set of pods using the configurations in this template
    metadata:
      labels:                    # The labels that will be applied to all the pods in this deployment
        app: go-cloud-k8s-thing
    spec:                        # Spec for the Pod base config, securityContext can be overridden in container
      # kubectl label nodes gok8sw01.lausanne.ch kubernetes.io/role=worker
      # comment the two next lines if you do not have worker nodes (rancher-desktop)
      #nodeSelector:
      #  node-type: worker
      serviceAccountName: go-cloud-k8s-thing-sa
      securityContext:           # https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
        seccompProfile:
          type: RuntimeDefault   # https://kubernetes.io/docs/tutorials/security/seccomp/
        runAsUser: 12121           # using a non privileged user
        runAsGroup: 12121          # using the group 'gouser' created in Dockerfile
        fsGroup: 100             # by adding fsGroup field, all processes of the container are also part
                                 # of the supplementary group ID 100 (users).
        supplementalGroups:
          - 100
      automountServiceAccountToken: false
      containers:
      - name: go-cloud-k8s-thing
        image: ghcr.io/lao-tseu-is-alive/go-cloud-k8s-thing:v0.3.3
        imagePullPolicy: Always
        securityContext:
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 12121           # using the user 'gouser' created in Dockerfile
          runAsGroup: 12121          # using the group 'gouser' created in Dockerfile
          capabilities:
            drop:
              - 'ALL'
          readOnlyRootFilesystem: true
        ports:
          - containerPort: 9090  # Should match the PORT env variable above  that the Go application listens on
        resources:
          limits:            # resource limit imposed to the pod, the container cannot utilize more res than specified
            cpu: 1000m       # 1000 millicpu or millicores 1 or 100% of a CPU core of a running node
            memory: 128Mi
            ephemeral-storage: 50Mi
          requests:          # explicit request of the minimum amount of resources the pod need
            cpu: 100m        # 100 millicpu or millicores 0.1 or 10% of a CPU core of a running node
            memory: 32Mi
            ephemeral-storage: 20Mi
        livenessProbe:           # To check the health of the Pod
          httpGet:
            path: /health
            port: 9090
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 15
          timeoutSeconds: 2
        readinessProbe:          # To check if the Pod is ready to serve traffic or not
          httpGet:
            path: /readiness
            port: 9090
            scheme: HTTP
          initialDelaySeconds: 5
          timeoutSeconds: 2
#        add the above if you think you need (for temp files ?), the Go code does not need it
#        volumeMounts:
#          - name: tmp
#            mountPath: /tmp
        env:
          - name: PORT
            value: "9090"
          - name: DB_DRIVER
            valueFrom:
              secretKeyRef:
                key: DB_DRIVER
                name: app-secrets-go-cloud-k8s-thing
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                key: DB_HOST
                name: app-secrets-go-cloud-k8s-thing
          - name: DB_PORT
            valueFrom:
              secretKeyRef:
                key: DB_PORT
                name: app-secrets-go-cloud-k8s-thing
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                key: DB_NAME
                name: app-secrets-go-cloud-k8s-thing
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                key: DB_USER
                name: app-secrets-go-cloud-k8s-thing
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                key: DB_PASSWORD
                name: app-secrets-go-cloud-k8s-thing
          - name: DB_SSL_MODE
            valueFrom:
              secretKeyRef:
                key: DB_SSL_MODE
                name: app-secrets-go-cloud-k8s-thing
          - name: ADMIN_USER
            valueFrom:
              secretKeyRef:
                key: ADMIN_USER
                name: app-secrets-go-cloud-k8s-thing
          - name: ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                key: ADMIN_PASSWORD
                name: app-secrets-go-cloud-k8s-thing
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                key: JWT_SECRET
                name: app-secrets-go-cloud-k8s-thing
          - name: JWT_DURATION_MINUTES
            valueFrom:
